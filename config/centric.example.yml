timeout: 30
retry_max_attempts: 3
retry_base_seconds: 1
retry_max_seconds: 8
jitter_ratio: 0.2
output_dir: data/raw
checkpoint_dir: data/checkpoints
env_file: .env

endpoints:
  - name: styles
    api_version: v2
    path: styles
    query_params:
      active: true
    skip_param: skip
    limit_param: limit
    limit: 100
    item_path: $
    count_spec:
      api_version: v2
      path: styles/count
      query_params:
        active: true
      result_path: $.total
