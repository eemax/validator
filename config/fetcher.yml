timeout: 30
retry_max_attempts: 3
retry_base_seconds: 40
retry_max_seconds: 75
jitter_ratio: 0.1
output_dir: data/raw
checkpoint_dir: data/checkpoints

endpoints:
  - name: seasons
    api_version: v2
    path: seasons
    skip_param: skip
    limit_param: limit
    limit: 50
    item_path: $
    count_spec:
      api_version: v2
      path: count/Season
      result_path: $.count
