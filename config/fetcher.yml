timeout: 30
retry_max_attempts: 3
retry_base_seconds: 40
retry_max_seconds: 75
jitter_ratio: 0.1
output_dir: data/raw
checkpoint_dir: data/checkpoints
env_file: .env

endpoints:
  - name: seasons
    api_version: v2
    path: seasons
    skip_param: skip
    limit_param: limit
    limit: 50
    item_path: $
    count_spec:
      api_version: v2
      path: count/Season
      result_path: $.count
  - name: styles
    api_version: v2
    path: styles
    query_params:
      active: true
    skip_param: skip
    limit_param: limit
    limit: 10
    item_path: $
    count_spec:
      api_version: v2
      path: count/Style
      query_params:
        active: true
      result_path: $.count
  - name: materials
    api_version: v2
    path: materials
    skip_param: skip
    limit_param: limit
    limit: 50
    item_path: $
    count_spec:
      api_version: v2
      path: count/Material
      result_path: $.count
  - name: colorways
    api_version: v2
    path: colorways
    skip_param: skip
    limit_param: limit
    limit: 10
    item_path: $
    count_spec:
      api_version: v2
      path: count/Colorway
      result_path: $.count
  - name: boms
    api_version: v3
    path: apparel_bom_revisions
    skip_param: skip
    limit_param: limit
    limit: 50
    item_path: $
    count_spec:
      api_version: v2
      path: count/ApparelBOMRevision
      result_path: $.count
  - name: bomrows
    api_version: v3
    path: part_materials
    skip_param: skip
    limit_param: limit
    limit: 50
    item_path: $
    count_spec:
      api_version: v2
      path: count/PartMaterial
      result_path: $.count
  - name: supplierquotes
    api_version: v2
    path: supplier_item_revisions
    skip_param: skip
    limit_param: limit
    limit: 50
    item_path: $
    count_spec:
      api_version: v2
      path: count/SupplierItemRevision
      result_path: $.count
  - name: suppliers
    api_version: v2
    path: suppliers
    skip_param: skip
    limit_param: limit
    limit: 50
    item_path: $
    count_spec:
      api_version: v2
      path: count/Supplier
      result_path: $.count
  - name: factories
    api_version: v2
    path: factories
    skip_param: skip
    limit_param: limit
    limit: 50
    item_path: $
    count_spec:
      api_version: v2
      path: count/Factory
      result_path: $.count
