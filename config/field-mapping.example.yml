# Public template for local Centric projection fields.
# Keep private mappings in a separate repo and set CENTRIC_FIELD_MAPPING, or copy this to
# .local/field-mapping.yml for repo-adjacent local work.

style:
  global_style_id_fields:
    - custom_article_number
  style_name_fields:
    - custom_article_name
    - node_name
  brand_code_fields:
    - custom_brand_code
  brand_name_fields:
    - custom_brand_name
  product_type_code_fields:
    - product_type
  lifecycle_status_fields:
    - custom_lifecycle_status
  attribute_fields:
    ARTICLE_NUMBER:
      - custom_article_number
    ARTICLE_NAME:
      - custom_article_name
    PRODUCT_AREA:
      - custom_product_area
    PRODUCT_GROUP:
      - custom_product_group
    PRODUCT_SUB_GROUP:
      - custom_product_sub_group
    BRAND_CATEGORY:
      - custom_brand_category
    GENDER:
      - custom_gender
    HTS_CODE:
      - custom_hts_code

season:
  brand_code_fields:
    - custom_season_brand_code
  brand_name_fields:
    - custom_season_brand_name
  season_code_fields:
    - code
    - custom_season_code

material:
  name_fields:
    - node_name
  composition_fields:
    - composition
    - technical_composition
    - custom_material_composition
    - description

colorway:
  global_variant_id_fields:
    - sys_id
  sku_fields:
    - code
    - node_name
